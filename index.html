<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منيو مطعم Food House</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #2c1b10;
            background-image: url('https://www.transparenttextures.com/patterns/wood-pattern.png');
            color: #f4e4bc;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 600px;
            margin: auto;
            border: 8px double #8d5524;
            padding: 20px;
            background: rgba(44, 27, 16, 0.9);
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        h1 {
            text-align: center;
            color: #d4af37;
            text-transform: uppercase;
            border-bottom: 2px solid #8d5524;
            padding-bottom: 10px;
            font-size: 2.5em;
            margin-top: 0;
        }
        .section-title {
            background: #8d5524;
            color: #fff;
            padding: 10px;
            margin-top: 30px;
            text-align: center;
            font-size: 1.5em;
            border-radius: 5px;
        }
        .menu-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 0;
            border-bottom: 1px dashed #5d4037;
        }
        .item-info {
            flex-grow: 1;
        }
        .item-name {
            font-size: 1.3em;
            font-weight: bold;
            color: #f4e4bc;
        }
        .item-price {
            font-size: 1.2em;
            color: #d4af37;
            font-weight: bold;
        }
        .footer {
            text-align: center;
            margin-top: 40px;
            font-style: italic;
            color: #8d5524;
            border-top: 1px solid #8d5524;
            padding-top: 10px;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>Food House</h1>
    <p style="text-align:center; color:#d4af37;">للمأكولات والضيافة العراقيّة الأصيلة</p>

    <div class="section-title">القائمة الرئيسية</div>

    <div class="menu-item">
        <div class="item-info">
            <div class="item-name">سكالوب</div>
        </div>
        <div class="item-price">2,000 د.ع</div>
    </div>

    <div class="menu-item">
        <div class="item-info">
            <div class="item-name">كباب لحم عراقي</div>
        </div>
        <div class="item-price">10,000 د.ع</div>
    </div>

    <div class="menu-item">
        <div class="item-info">
            <div class="item-name">دجاج مشوي</div>
        </div>
        <div class="item-price">8,000 د.ع</div>
    </div>

    <div class="menu-item">
        <div class="item-info">
            <div class="item-name">قوزي لحم</div>
        </div>
        <div class="item-price">12,000 د.ع</div>
    </div>

    <div class="footer">
        بإدارة حسن صدام - نتشرف بزيارتكم 2026
    </div>
</div>

</body>
</html>
